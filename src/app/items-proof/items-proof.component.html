<body width="100%" style="background-color:#ffffff; padding:0px; margin:0px">

<table cellspacing="0" cellpadding="0" width="600" text-align="center" class="rwidth300 rheight150">
 <tr>
  <td>

   </a>
  </td>
 </tr>
</table>
<!-- /Anchor -->
<!-- Template 3 Item -->

      <img src="https://sen0ch.github.io/email-editor/src/assets/images/spacer_dadada.gif" width="10" height="1" border-width="0" class="width280" />
     </div>
    </td>
   </tr>

    <td width="1" style="background-color: #dadada;" class="hide"></td>

         </table>

          </td>
         </tr>
         </table>

       <td width="10" class="hide"></td>
       <td style="text-align:left">
        <!-- Col 1 -->
        <table width="100%" cellpadding="0" cellspacing="0" class="rwidth300 divider">
         <tr>
          <td width="185">
           <a href="{{ item.url1 }}">
            <img src="https://sen0ch.github.io/email-editor/src/assets/images/item1.jpg" alt="{{ item.item1 }}" width="185" height="185" border-width="0" class="rwidth145 rheight145 img-circle nowrap" />
           </a>
           <span class="hide">
            <br />
           </span>
           <table width="173" cellpadding="0" cellspacing="0" class="rwidth145" style="display:inline; text-align:right; vertical-align:top;">
            <tr>
             <td width="173" class="rwidth145" style="text-align:left;">
              <div style=" font-family:arial,verdana; font-size:15px; color:#666666; line-height:18px; font-weight:bold; margin:10px 0 0 10px">
               <a href="{{ item.url1 }}" 
               style="text-decoration:none; color:#666666">
               {{ item.item1 }}
               </a>
              </div>
              <div style="font-family:arial,verdana; font-size:13px; color: #666666 ; line-height:17px; margin:0 0 0 10px">
               <a href="{{ item.url1 }}" 
               style="text-decoration:none; color:#666666">
               {{item.description1}}
               </a>
              </div>
              <div style="font-family:arial,verdana; font-size:13px; color: #666666; line-height:17px;">
               <a href="{{ item.url1 }}">
                  <span style="background-color: #b690f1; border: none; color: white; padding: 10px 20px; text-align: center; 
                  text-decoration: none; display: inline-block; margin:8px 0 0 10px; border-radius: 16px;">buy now</span>
               </a>
              </div>
             </td>
            </tr>
           </table>
          </td>

        </table>

        <!-- Middle -->
       </td>

       <td width="1" style="background-color: #dadada;" class="block_wrap"></td>
       <td width="7" class="block_wrap"></td>

                  text-decoration: none; display: inline-block; margin:8px 0 0 10px; border-radius: 16px;">buy now</span>
               </a>

        </table>
        <!-- /Col 2 -->
        <!-- Middle -->

       <td width="1" style="background-color: #dadada;" class="block_wrap"></td>
       <td width="7" class="block_wrap"></td>

        <!-- Col 3 -->
        <table width="100%" cellpadding="0" cellspacing="0" class="rwidth300">

               </a>

             </td>
            </tr>

          </td>

        </table>
        <!-- /Col 3 -->
       </td>
       <td width="10"></td>
      </tr>
     </table>
     <table width="598" cellpadding="0" cellspacing="0" class="rwidth250">
      <tr>
       <td height="12">
        <div style="line-height:12px;">&nbsp;</div>
       </td>
      </tr>

    </td>
    <td width="1" height="1" style="background-color: #ffffff;" class="hide">
     <img src="https://sen0ch.github.io/email-editor/src/assets/images/spacer_dadada.gif" width="1" height="5" border-width="0" />
      <tr>
       <td colspan="3" height="1" style="background-color: #dadada;" class="hide">
        <div style="font-family:arial,verdana; font-size:1px; color:#666666; line-height:1px; font-weight:bold;">
         <!-- Spacer --><img src="https://sen0ch.github.io/email-editor/src/assets/images/spacer_dadada.gif" width="0" height="1" border-width="0" class="rwidth280" />
        </div>

  <!-- Spacer -->

<table width="600" cellpadding="0" cellspacing="0" border-width="0" text-align="center" class="rwidth300">
 <tr>
