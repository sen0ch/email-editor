<div class="container custom-container">
  <div class="col-md-12">
    
    <h3 class="mb-3 text-center">Edit</h3>

    <div class="form-group">
      <input type="text" [(ngModel)]="itemData.anchor" class="form-control" placeholder="Anchor">
    </div>
    
    <div class="form-group">
        <input type="text" [(ngModel)]="itemData.headline" class="form-control" placeholder="Headline">
    </div>
  
      <div class="form-group">
        <input type="text" [(ngModel)]="itemData.item1" class="form-control" placeholder="Item1">
      </div>
      <div class="form-group">
        <input type="text" [(ngModel)]="itemData.item2" class="form-control" placeholder="Item2">
      </div>
      <div class="form-group">
        <input type="text" [(ngModel)]="itemData.item3" class="form-control" placeholder="Item3">
      </div>

      <div class="form-group">
        <input type="text" [(ngModel)]="itemData.description1" class="form-control" placeholder="Description1">
      </div>   
      <div class="form-group">
      <input type="text" [(ngModel)]="itemData.description2" class="form-control" placeholder="Description2">
      </div>
      <div class="form-group">
        <input type="text" [(ngModel)]="itemData.description3" class="form-control" placeholder="Description3">
      </div>

      <div class="form-group">
        <input type="text" [(ngModel)]="itemData.url0" class="form-control" placeholder="url Anchor">
      </div>
    
      <div class="form-group">
        <input type="text" [(ngModel)]="itemData.url1" class="form-control" placeholder="url 1">
      </div>
      <div class="form-group">
        <input type="text" [(ngModel)]="itemData.url2" class="form-control" placeholder="url 2">
      </div>
      <div class="form-group">
        <input type="text" [(ngModel)]="itemData.url3" class="form-control" placeholder="url 3">
      </div>

    <div class="form-group">
      <button class="btn btn-success btn-lg btn-block" (click)="updateItem()">Update</button>
    </div>

    
  </div>
</div>
